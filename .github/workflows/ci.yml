name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: |
          cargo fmt -p router-api-server --check
          cargo fmt -p router-metrics-exporter --check

      - name: Check compilation
        run: |
          cargo check -p router-api-server
          cargo check -p router-metrics-exporter

      - name: Run clippy
        run: |
          cargo clippy -p router-api-server -- -D warnings
          cargo clippy -p router-metrics-exporter -- -D warnings

      - name: Run tests
        run: |
          cargo test -p router-api-server --verbose
          cargo test -p router-metrics-exporter --verbose

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM contracts
        run: |
          for pkg in router-core router-registry router-access router-middleware \
                     router-timelock router-multicall router-execution router-quote; do
            cargo build -p $pkg --target wasm32-unknown-unknown --release
          done

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  integration-test:
    name: Integration Tests (Testnet)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Run integration tests
        run: cargo test --test integration_tests -- --ignored --test-threads=1 --nocapture
        env:
          STELLAR_RPC_URL: https://soroban-testnet.stellar.org
        continue-on-error: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            target/debug/
            *.log
          retention-days: 7

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run cargo-tarpaulin
        run: >
          cargo tarpaulin
          --workspace
          --exclude-files "contracts/*"
          --timeout 300
          --out xml
          --output-dir ./coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check coverage threshold
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' ./coverage/cobertura.xml | head -1)
          COVERAGE_INT=$(echo "$COVERAGE" | awk '{printf "%d", $1 * 100}')
          echo "Current coverage: ${COVERAGE_INT}%"
          if [ "$COVERAGE_INT" -lt 70 ]; then
            echo "❌ Coverage ${COVERAGE_INT}% is below the 70% threshold"
            exit 1
          else
            echo "✅ Coverage ${COVERAGE_INT}% meets the 70% threshold"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/
          retention-days: 30
