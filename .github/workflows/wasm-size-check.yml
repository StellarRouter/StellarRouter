name: WASM Size Regression Detection

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  wasm-size-check:
    name: Check WASM Size Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-size-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM contracts
        run: |
          for pkg in router-core router-registry router-access router-middleware \
                     router-timelock router-multicall router-execution router-quote; do
            cargo build -p $pkg --target wasm32-unknown-unknown --release --no-default-features
          done

      - name: Check WASM sizes
        run: |
          CONTRACTS=(
            "router_core"
            "router_registry"
            "router_access"
            "router_middleware"
            "router_timelock"
            "router_multicall"
            "router_execution"
            "router_quote"
          )

          BASELINE_FILE=".wasm-size-baseline.txt"
          REGRESSION_DETECTED=0

          for contract in "${CONTRACTS[@]}"; do
            WASM_FILE="target/wasm32-unknown-unknown/release/${contract}.wasm"
            if [ -f "$WASM_FILE" ]; then
              SIZE=$(stat -c%s "$WASM_FILE")
              echo "${contract}: ${SIZE} bytes"

              if [ -f "$BASELINE_FILE" ]; then
                BASELINE_SIZE=$(grep "^${contract}:" "$BASELINE_FILE" | cut -d: -f2 | tr -d ' ')
                if [ -n "$BASELINE_SIZE" ]; then
                  INCREASE=$((SIZE - BASELINE_SIZE))
                  PERCENT=$((INCREASE * 100 / BASELINE_SIZE))

                  if [ $PERCENT -gt 10 ]; then
                    echo "❌ $contract: Size increased by ${PERCENT}% (${BASELINE_SIZE} → ${SIZE} bytes)"
                    REGRESSION_DETECTED=1
                  elif [ $PERCENT -gt 0 ]; then
                    echo "⚠️  $contract: Size increased by ${PERCENT}% (${BASELINE_SIZE} → ${SIZE} bytes)"
                  else
                    echo "✅ $contract: No regression (${BASELINE_SIZE} → ${SIZE} bytes)"
                  fi
                else
                  echo "ℹ️  $contract: No baseline entry, skipping comparison"
                fi
              else
                echo "ℹ️  No baseline file found, skipping comparison"
              fi
            else
              echo "⚠️  $contract: WASM file not found at $WASM_FILE"
            fi
          done

          if [ $REGRESSION_DETECTED -eq 1 ]; then
            echo ""
            echo "WASM size regression detected! Contracts grew by more than 10%."
            exit 1
          fi

      - name: Update WASM size baseline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          CONTRACTS=(
            "router_core"
            "router_registry"
            "router_access"
            "router_middleware"
            "router_timelock"
            "router_multicall"
            "router_execution"
            "router_quote"
          )

          BASELINE_FILE=".wasm-size-baseline.txt"
          > "$BASELINE_FILE"

          for contract in "${CONTRACTS[@]}"; do
            WASM_FILE="target/wasm32-unknown-unknown/release/${contract}.wasm"
            if [ -f "$WASM_FILE" ]; then
              SIZE=$(stat -c%s "$WASM_FILE")
              echo "${contract}:${SIZE}" >> "$BASELINE_FILE"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$BASELINE_FILE"
          git commit -m "chore: update WASM size baseline" || true
          git pull --rebase || true
          git push || echo "::warning::Baseline push failed (likely a concurrent merge race). Will retry on next push."
