[advisories]
vulnerability = "deny"
# cargo-deny ≥0.18: unmaintained/unsound take a scope value, not a lint level.
# "all" = report unmaintained/unsound crates across workspace and transitive deps.
unmaintained = "all"
unsound = "all"
yanked = "warn"
ignore = [
    # RUSTSEC-2024-0437: Crash in protobuf 2.x via uncontrolled recursion when
    # parsing deeply-nested externally-supplied data.  In this project protobuf
    # is the internal intermediate format for prometheus metrics serialisation
    # (registry.gather() → TextEncoder) and is never used to parse external
    # input.  The vulnerability cannot be triggered in this usage.
    { id = "RUSTSEC-2024-0437", reason = "protobuf only serialises internal metrics; no external protobuf input is ever parsed" },
]

[licenses]
unlicensed = "deny"
copyleft = "warn"
allow = [
    "MIT",
    "Apache-2.0",
    # Note: "Apache-2.0 OR MIT" compound expression removed — newer cargo-deny
    # does not accept SPDX OR expressions in the allow list; the individual
    # identifiers above already cover dual-licensed Apache-2.0/MIT crates.
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
