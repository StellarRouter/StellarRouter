[advisories]
# RUSTSEC-2024-0437: Crash in protobuf 2.x via uncontrolled recursion when
# parsing deeply-nested externally-supplied data.
#
# This project uses protobuf only as the internal intermediate representation
# for the prometheus metrics pipeline (registry.gather() → TextEncoder).
# All data flows from our own in-process registry; no external protobuf input
# is ever parsed.  The vulnerability cannot be triggered in this usage.
ignore = ["RUSTSEC-2024-0437"]
